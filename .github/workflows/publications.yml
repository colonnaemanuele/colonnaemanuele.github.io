name: Update My Publications

# Questo evento permette di lanciare la Action manualmente dall'interfaccia di GitHub
on:
  workflow_dispatch: 

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv pip install --system requests

      - name: Run Scraper
        run: python scripts/update_my_portfolio.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/my_publications.json
          
          if git diff-index --quiet HEAD; then
            echo "Nessuna nuova pubblicazione trovata."
          else
            git commit -m "feat: aggiornamento automatico pubblicazioni portfolio"
            git push
          fi